appId: com.taskmanager.app
productName: TaskManager
directories:
  output: release
files:
  - dist/**/*
  - electron/**/*
  - node_modules/**/*
  - package.json
extraResources:
  - from: assets/
    to: assets/
mac:
  target: dmg
  icon: assets/icon.icns
win:
  target: nsis
  icon: assets/icon.ico
linux:
  target: AppImage
  icon: assets/icon.png
